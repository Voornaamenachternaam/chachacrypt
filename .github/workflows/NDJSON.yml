name: Robust PDF Extraction (container job, tesseract+poppler preinstalled)

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "Direct URL to the zip file containing PDFs"
        required: true
        type: string

jobs:
  extract:
    # GitHub-hosted runner; Free-tier users can run this but note hosted-runner limits.
    runs-on: ubuntu-latest

    # Use a Docker image that already includes Tesseract & Poppler + Python.
    # If you prefer a different image, replace the image string below.
    container:
      image: docker://fundanie/docker-python3-tesseract-opencv-poppler:latest

    timeout-minutes: 360
    permissions: read-all

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Show environment info (debug)
        run: |
          echo "Container image: ${{ job.container.image }}"
          python3 --version || true
          tesseract --version || true
          pdftotext -v || true
          ls -lah /usr/bin | sed -n '1,120p' || true

      - name: Create extractor script + requirements (single-file)
        run: |
          mkdir -p scripts

          cat > scripts/requirements.txt <<'REQ'
pymupdf
pdfminer.six
pdfplumber
pytesseract
Pillow
tqdm
REQ

          cat > scripts/extract_pdfs_robust.py <<'PY'
#!/usr/bin/env python3
"""
Robust multi-engine PDF extractor (page-by-page streaming).
MuPDF -> pdfplumber -> OCR (Tesseract) -> pdfminer fallback.
Writes per-file text to tmp dir then appends to combined output.txt.
Exits non-zero if any page of any PDF is left without extracted content.
"""
import argparse
import os
import sys
import io
from pathlib import Path
import fitz  # pymupdf
import pdfplumber
import pdfminer.high_level
from PIL import Image
import pytesseract
import traceback

PAGE_CONTENT_THRESHOLD = 3  # min chars per page to count as non-empty

def extract_with_mupdf_page(page):
    try:
        txt = page.get_text("text") or ""
        return txt
    except Exception:
        return ""

def extract_with_pdfminer_path(path):
    try:
        txt = pdfminer.high_level.extract_text(str(path)) or ""
        return txt
    except Exception:
        return ""

def render_page_to_image(page, dpi):
    mat = fitz.Matrix(dpi / 72.0, dpi / 72.0)
    pix = page.get_pixmap(matrix=mat, alpha=False)
    png_bytes = pix.tobytes("png")
    return Image.open(io.BytesIO(png_bytes))

def ocr_image_to_text(img, lang):
    try:
        return pytesseract.image_to_string(img, lang=lang) or ""
    except Exception:
        return ""

def process_pdf(path: Path, out_txt_path: Path, ocr_dpi: int, tesseract_lang: str):
    details = {"path": str(path), "pages": 0, "failed_pages": []}
    try:
        doc = fitz.open(path)
        page_count = doc.page_count
        details["pages"] = page_count

        with out_txt_path.open("w", encoding="utf-8") as out_f:
            out_f.write(f"===== FILE: {path.name} (pages={page_count}) =====\n\n")

            for pno in range(page_count):
                page = doc.load_page(pno)
                page_header = f"\n--- PAGE {pno+1}/{page_count} ---\n"
                out_f.write(page_header)
                page_accum = []

                # 1) MuPDF
                try:
                    mupdf_text = extract_with_mupdf_page(page)
                except Exception:
                    mupdf_text = ""
                if mupdf_text and len(mupdf_text.strip()) >= PAGE_CONTENT_THRESHOLD:
                    out_f.write("\n[MuPDF TEXT]\n")
                    out_f.write(mupdf_text)
                    page_accum.append(("mupdf", len(mupdf_text)))
                else:
                    # 2) pdfplumber page text
                    try:
                        with pdfplumber.open(path) as docp:
                            pdfpl_text = docp.pages[pno].extract_text() or ""
                    except Exception:
                        pdfpl_text = ""
                    if pdfpl_text and len(pdfpl_text.strip()) >= PAGE_CONTENT_THRESHOLD:
                        out_f.write("\n[PDFPlumber TEXT]\n")
                        out_f.write(pdfpl_text)
                        page_accum.append(("pdfplumber", len(pdfpl_text)))
                    else:
                        # 3) OCR
                        try:
                            img = render_page_to_image(page, dpi=ocr_dpi)
                            ocr_text = ocr_image_to_text(img, lang=tesseract_lang) or ""
                        except Exception:
                            ocr_text = ""
                        if ocr_text and len(ocr_text.strip()) >= PAGE_CONTENT_THRESHOLD:
                            out_f.write("\n[OCR TEXT]\n")
                            out_f.write(ocr_text)
                            page_accum.append(("ocr", len(ocr_text)))
                        else:
                            details["failed_pages"].append(pno + 1)
                            out_f.write("\n[NO TEXT EXTRACTED FOR THIS PAGE AFTER ALL ENGINES]\n")

                # tables (pdfplumber)
                try:
                    with pdfplumber.open(path) as docp:
                        page_obj = docp.pages[pno]
                        tables = page_obj.extract_tables()
                        if tables:
                            out_f.write("\n[TABLES - TSV rows]\n")
                            for t in tables:
                                for row in t:
                                    out_f.write("\t".join([("" if c is None else str(c)) for c in row]) + "\n")
                except Exception:
                    pass

            out_f.flush()

        # whole-document pdfminer fallback if every page failed
        if len(details["failed_pages"]) == details["pages"]:
            whole_text = extract_with_pdfminer_path(path)
            if whole_text and len(whole_text.strip()) >= PAGE_CONTENT_THRESHOLD:
                with out_txt_path.open("a", encoding="utf-8") as out_f:
                    out_f.write("\n[PDFMiner whole-document fallback]\n")
                    out_f.write(whole_text)
                details["failed_pages"] = []

        success = len(details["failed_pages"]) == 0
        return success, details

    except Exception as e:
        details["error"] = str(e)
        details["traceback"] = traceback.format_exc()
        return False, details

def main():
    parser = argparse.ArgumentParser()
    parser.add_argument("--input-dir", required=True)
    parser.add_argument("--output-file", required=True)
    parser.add_argument("--tmp-dir", required=True)
    parser.add_argument("--ocr-dpi", type=int, default=300)
    parser.add_argument("--tesseract-lang", type=str, default="eng")
    args = parser.parse_args()

    input_dir = Path(args.input_dir)
    output_file = Path(args.output_file)
    tmp_dir = Path(args.tmp_dir)
    ocr_dpi = args.ocr_dpi
    tesseract_lang = args.tesseract_lang

    tmp_dir.mkdir(parents=True, exist_ok=True)
    if output_file.exists():
        output_file.unlink()

    pdf_paths = sorted([p for p in input_dir.rglob("*.pdf")])
    if not pdf_paths:
        print("ERROR: No PDF files found in input directory.")
        sys.exit(2)

    overall_failed = []
    processed_count = 0

    for pdf_path in pdf_paths:
        print(f"\n--- Processing: {pdf_path} ---")
        per_txt = tmp_dir / (pdf_path.stem + ".txt")
        success, details = process_pdf(pdf_path, per_txt, ocr_dpi=ocr_dpi, tesseract_lang=tesseract_lang)
        if not success:
            print(f"FAILED to fully extract {pdf_path}; details: {details}")
            overall_failed.append((str(pdf_path), details))
        else:
            size = per_txt.stat().st_size if per_txt.exists() else 0
            if size < 10:
                overall_failed.append((str(pdf_path), {"reason":"per-file output too small", "size":size}))
            else:
                with per_txt.open("r", encoding="utf-8") as pf, output_file.open("a", encoding="utf-8") as of:
                    of.write(pf.read())
                    of.write("\n\n")
                processed_count += 1

    if overall_failed:
        print("\n\nExtraction finished with ERRORS. Summary of failures:")
        for p, d in overall_failed:
            print(f"- {p} -> {d}")
        sys.exit(3)

    if not output_file.exists() or output_file.stat().st_size < 10:
        print("ERROR: Combined output file missing or too small.")
        sys.exit(4)

    print(f"\nALL PDFs processed successfully. Combined output: {output_file} (bytes={output_file.stat().st_size})")
    sys.exit(0)

if __name__ == "__main__":
    main()
PY

          chmod +x scripts/extract_pdfs_robust.py

      - name: Install Python dependencies (pip)
        run: |
          # ensure pip is available in the container
          python3 -m pip install --upgrade pip
          python3 -m pip install --no-cache-dir -r scripts/requirements.txt

      - name: Download ZIP
        run: |
          mkdir -p data
          echo "Downloading ${{ github.event.inputs.zip_url }}"
          curl -L --fail "${{ github.event.inputs.zip_url }}" -o data/archive.zip
          ls -lah data

      - name: Extract ZIP
        run: |
          rm -rf data/extracted
          mkdir -p data/extracted
          unzip -q data/archive.zip -d data/extracted || (echo "unzip failed" && exit 2)
          find data/extracted -maxdepth 3 -type f | sed -n '1,200p'

      - name: Run robust PDF extractor
        env:
          TESSERACT_LANG: "eng"
          OCR_DPI: "300"
        run: |
          python3 scripts/extract_pdfs_robust.py \
            --input-dir data/extracted \
            --output-file output.txt \
            --tmp-dir tmp_extraction \
            --ocr-dpi ${OCR_DPI} \
            --tesseract-lang "${TESSERACT_LANG}"

      - name: Upload artifact (modern: unzipped single-file support)
        uses: actions/upload-artifact@v7
        with:
          path: output.txt
          archive: false
          retention-days: 90

