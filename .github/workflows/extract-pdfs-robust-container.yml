name: Robust PDF Extraction (container job)

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "Direct URL to the zip file containing PDFs"
        required: true
        type: string

jobs:
  extract:
    runs-on: ubuntu-latest
    # Container image that includes Python, Tesseract and Poppler.
    # Replace image if you prefer a different one.
    container:
      image: docker://fundanie/docker-python3-tesseract-opencv-poppler:latest

    timeout-minutes: 360
    permissions: read-all

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Quick environment check
        run: |
          echo "Container image: ${{ job.container.image }}"
          python3 --version || true
          tesseract --version || true
          pdftotext -v || true

      - name: Install Python dependencies (pip)
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --no-cache-dir -r scripts/requirements.txt

      - name: Download ZIP
        run: |
          mkdir -p data
          echo "Downloading ${{ github.event.inputs.zip_url }}"
          curl -L --fail "${{ github.event.inputs.zip_url }}" -o data/archive.zip
          ls -lah data

      - name: Extract ZIP
        run: |
          rm -rf data/extracted
          mkdir -p data/extracted
          unzip -q data/archive.zip -d data/extracted || (echo "unzip failed" && exit 2)
          # show some files for debugging
          find data/extracted -maxdepth 5 -type f | sed -n '1,200p'

      - name: Run robust PDF extractor (no chmod)
        env:
          TESSERACT_LANG: "eng"
          OCR_DPI: "300"
        run: |
          # run directly with python3 — no executable bit required
          python3 -u scripts/extract_pdfs_robust.py \
            --input-dir data/extracted \
            --output-file output.txt \
            --tmp-dir tmp_extraction \
            --ocr-dpi ${OCR_DPI} \
            --tesseract-lang "${TESSERACT_LANG}"

      - name: Validate output files exist
        run: |
          echo "Listing outputs:"
          ls -lah output.txt || echo "output.txt missing"
          ls -lah extraction-manifest.json || echo "extraction-manifest.json missing"

      - name: Upload extracted text artifact
        uses: actions/upload-artifact@v4
        with:
          name: extracted-pdf-content
          path: output.txt
          compression-level: 0
          retention-days: 90

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: extraction-manifest
          path: extraction-manifest.json
          compression-level: 0
          retention-days: 90
